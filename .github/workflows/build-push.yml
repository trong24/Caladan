name: Build and push to GHCR

on:
  push:
    branches: [main]
    paths: ['app/**']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      metrics: ${{ steps.outputs.outputs.metrics }}
      probe: ${{ steps.outputs.outputs.probe }}
      build_matrix: ${{ steps.matrix.outputs.build_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set outputs (manual run)
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "metrics=true" >> $GITHUB_OUTPUT
          echo "probe=true" >> $GITHUB_OUTPUT

      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            metrics: app/metrics/**
            probe: app/probe/**

      - name: Set job outputs
        id: outputs
        run: |
          echo "metrics=${{ steps.manual.outputs.metrics || steps.filter.outputs.metrics || 'false' }}" >> $GITHUB_OUTPUT
          echo "probe=${{ steps.manual.outputs.probe || steps.filter.outputs.probe || 'false' }}" >> $GITHUB_OUTPUT

      - name: Set build matrix
        id: matrix
        run: |
          m="${{ steps.outputs.outputs.metrics }}"
          p="${{ steps.outputs.outputs.probe }}"
          if [ "$m" = "true" ] && [ "$p" = "true" ]; then
            echo 'build_matrix=[{"image":"metrics","context":"./app/metrics","dockerfile":"./app/metrics/Dockerfile","name":"metrics"},{"image":"probe","context":"./app/probe","dockerfile":"./app/probe/Dockerfile","name":"probe"}]' >> $GITHUB_OUTPUT
          elif [ "$m" = "true" ]; then
            echo 'build_matrix=[{"image":"metrics","context":"./app/metrics","dockerfile":"./app/metrics/Dockerfile","name":"metrics"}]' >> $GITHUB_OUTPUT
          elif [ "$p" = "true" ]; then
            echo 'build_matrix=[{"image":"probe","context":"./app/probe","dockerfile":"./app/probe/Dockerfile","name":"probe"}]' >> $GITHUB_OUTPUT
          else
            echo 'build_matrix=[]' >> $GITHUB_OUTPUT
          fi

  build:
    needs: changes
    if: needs.changes.outputs.build_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.changes.outputs.build_matrix) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
